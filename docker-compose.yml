services:
  opencode:
    image: ghcr.io/moya-app/opencode-slackbot:latest
    env_file: app.env
    volumes:
      - ./config/opencode.jsonc:/root/.config/opencode/opencode.jsonc:ro
      - ./data:/app/data:ro
      - session_data:/root/.local/share/opencode
    init: true

volumes:
  session_data:
